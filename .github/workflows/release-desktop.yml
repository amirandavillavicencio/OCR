name: Release Desktop

on:
  workflow_dispatch:

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppPortable.sln

      - name: Build
        run: dotnet build AppPortable.sln -c Release --no-restore

      - name: Test
        run: dotnet test AppPortable.Tests/AppPortable.Tests.csproj -c Release --no-build

      - name: Publish Desktop
        run: dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win-x64
          path: artifacts/desktop
