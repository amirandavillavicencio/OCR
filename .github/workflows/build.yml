name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppPortable.sln

      - name: Build
        run: dotnet build AppPortable.sln -c Release --no-restore

      - name: Test
        run: dotnet test AppPortable.Tests/AppPortable.Tests.csproj -c Release --no-build

      - name: Publish Desktop
        run: dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
