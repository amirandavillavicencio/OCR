name: Build Desktop App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppPortable.sln

      - name: Build
        run: dotnet build AppPortable.sln -c Release --no-restore

      - name: Test
        run: dotnet test AppPortable.Tests/AppPortable.Tests.csproj -c Release --no-build

      - name: Publish
        run: dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: appportable-publish
          path: AppPortable.Desktop/bin/Release/net8.0-windows/win-x64/publish/
